<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnipVault — Code Snippet Manager</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <div id="app">
    <!-- Nav -->
    <nav class="navbar" id="navbar">
      <div class="nav-inner">
        <a href="/" class="nav-logo" onclick="navigate('/');return false;">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">SnipVault</span>
        </a>
        <div class="nav-links">
          <a href="/explore" class="nav-link" onclick="navigate('/explore');return false;">Explore</a>
          <div id="nav-auth"></div>
        </div>
      </div>
    </nav>

    <!-- Main content -->
    <main id="main"></main>

    <!-- Toast -->
    <div id="toast-container"></div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal" id="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div id="modal-content"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
